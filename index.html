<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Another Lightweight Web Template</title>
    <meta name="description" content="Just Another Lightweight Web Template">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="js/scripts.js" defer></script>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>
<body>
    <!-- keep this --><button id="theme-toggle">Toggle theme</button>
    <!-- keep h1 first(optional, recommended) --><h1>This is my website template.</h1>
    <!-- add your content here -->
    <p>This template is designed for simple and responsive websites. Click the links below for other pages.</p>
    <!-- only add links below(optional, recommended) -->
    <a href="example.html">Example article</a>
</body>
</html>
